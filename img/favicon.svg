    <circle cx="0" cy="0" r="6" fill="#f0f0f0" stroke="#1e1e1e" stroke-width="2"/>
  </g>

  <!-- Pokébola Derecha -->
  <g transform="translate(80, 60) rotate(-45) scale(0.45)">
    <circle cx="0" cy="0" r="45" fill="#f0f0f0" stroke="#1e1e1e" stroke-width="6"/>
    <path d="M -45 0 A 45 45 0 0 1 45 0 Z" fill="#EE1515" stroke="#1e1e1e" stroke-width="6"/>
    <line x1="-45" y1="0" x2="45" y2="0" stroke="#1e1e1e" stroke-width="8"/>
    <circle cx="0" cy="0" r="14" fill="#f0f0f0" stroke="#1e1e1e" stroke-width="6"/>
    <circle cx="0" cy="0" r="6" fill="#f0f0f0" stroke="#1e1e1e" stroke-width="2"/>
  </g>
  
  <!-- Chispas de impacto frontales -->
  <circle cx="60" cy="60" r="8" fill="#ffffff" />
  <path d="M60,40 L63,55 L75,50 L65,60 L80,60 L65,65 L75,75 L60,68 L45,75 L55,65 L40,60 L55,60 L45,50 L57,55 Z" fill="#ffffff"/>
