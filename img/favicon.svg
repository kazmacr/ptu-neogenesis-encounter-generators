  <!-- Pokébola Izquierda -->
  <g transform="translate(40, 60) rotate(45) scale(0.45)">
    <circle cx="0" cy="0" r="45" fill="#f0f0f0" stroke="#1e1e1e" stroke-width="6"/>
    <path d="M -45 0 A 45 45 0 0 1 45 0 Z" fill="#EE1515" stroke="#1e1e1e" stroke-width="6"/>
    <line x1="-45" y1="0" x2="45" y2="0" stroke="#1e1e1e" stroke-width="8"/>
